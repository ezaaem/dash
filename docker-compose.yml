version: "3.9"
services:
  web:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    command: sh -c "npm install && npm run dev -p 3000"
volumes:
  node_modules:
